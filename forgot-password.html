<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <meta name="description"
        content="AI Emailový Agent - Přihlaste se do svého účtu nebo se zaregistrujte pro chytrou automatizaci emailů a podporu zákazníků s pomocí AI.">
    <meta name="keywords" content="přihlášení, registrace, AI, emailový agent, automatizace, účet, StejDesign">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Stejdesign">
    <link rel="canonical" href="https://ai-agent-frontend-9nrf.onrender.com/login" />
    <title>Zapomenuté heslo - AI Emailový Agent</title>


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .mode-login .signup-steps,
        .mode-login #authToggle,
        /* „Máte už účet?“ link */
        .mode-login #step1

        /* registrační formulář */
            {
            display: none !important;
        }

        .mode-login #loginForm {
            display: block !important;
        }

        .mode-login #formTitle {
            content: none;
        }

        .mode-login .signup-form-container {
            padding-top: 2.25rem;
        }

        .mode-login .form-header {
            margin-bottom: 1.25rem;
        }

        /* menší mezery, ať login působí kompaktněji */
        .mode-login #loginForm .form-group {
            margin-bottom: 1rem;
        }

        /* Jemný overlay při odesílání */

        .overlay {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            background: rgba(250, 250, 255, 0.55);
            backdrop-filter: blur(8px) saturate(1.2);
            -webkit-backdrop-filter: blur(8px) saturate(1.2);
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s ease;
            z-index: 3000;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* karta uprostřed */
        .loader {
            display: flex;
            align-items: center; 
            gap: 14px;
            padding: 14px 18px;
            border-radius: 14px;
            background: rgba(255, 255, 255, .75);
            box-shadow: 0 8px 30px rgba(0, 0, 0, .12);
        }

        /* moderní spinner */
        .loader .ring {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background:
                conic-gradient(from 0turn, #667eea, #764ba2, #667eea) border-box;
            -webkit-mask:
                radial-gradient(farthest-side, transparent 55%, #000 57%) center/100% 100% no-repeat,
                linear-gradient(#000 0 0) padding-box;
            mask:
                radial-gradient(farthest-side, transparent 55%, #000 57%) center/100% 100% no-repeat,
                linear-gradient(#000 0 0) padding-box;
            animation: spin 0.9s linear infinite;
        }

        .loader p {
            margin: 0;
            font-weight: 600;
            color: #2c3e50;
            letter-spacing: .2px;
        }

        /* jemné „dýchání“ celé karty */
        .overlay.show .loader {
            animation: breathe 1.6s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(1turn);
            }
        }

        @keyframes breathe {

            0%,
            100% {
                transform: translateZ(0) scale(1);
            }

            50% {
                transform: translateZ(0) scale(.985);
            }
        }

        /* Animated Background Grid */
        .header-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            opacity: 0.4;
            background-image:
                linear-gradient(rgba(102, 126, 234, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(102, 126, 234, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(50px);
            }
        }

        /* button loading transition */
        .btn .loading {
            transition: opacity .2s;
        }


        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #ecf0f1;
            /* Lighter text for dark bg */
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            padding: 1rem 0;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        .logo-img-wrapper {
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 15px;
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .logo:hover .logo-img-wrapper {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        .logo img {
            height: 90px;
            width: auto;
        }

        .back-link {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            padding: 8px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* Main Content */
        .main-content {
            display: flex;
            min-height: calc(100vh - 80px);
            align-items: center;
            padding: 2rem 0;
        }

        .signup-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            width: 100%;
            align-items: center;
        }

        .signup-info {
            color: white;
        }

        .signup-info h1 {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, #fff, #f0f8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: slideInLeft 1s ease-out;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .signup-info p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
            animation: slideInLeft 1s ease-out 0.2s both;
        }

        .benefits {
            list-style: none;
            animation: slideInLeft 1s ease-out 0.4s both;
        }

        .benefits li {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .benefits li::before {
            content: '✓';
            background: #2ecc71;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1rem;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Signup Form */
        .signup-form-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            animation: slideInRight 1s ease-out;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Top Border Gradient */
        .signup-form-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
        }

        .form-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-header h2 {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .form-header p {
            color: #7f8c8d;
            font-size: 1rem;
        }

        .signup-steps {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .step {
            display: flex;
            align-items: center;
            color: #bdc3c7;
            font-size: 0.9rem;
        }

        .step.active {
            color: #667eea;
            font-weight: 600;
        }

        .step-number {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #f1f2f6;
            color: #a4b0be;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 0.5rem;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .step.active .step-number {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            box-shadow: 0 4px 10px rgba(238, 90, 36, 0.3);
        }

        .step:not(:last-child)::after {
            content: '';
            width: 40px;
            height: 2px;
            background: #f1f2f6;
            margin: 0 1rem;
        }

        .step.active:not(:last-child)::after {
            background: #ff6b6b;
        }

        /* Form Styles */
        .signup-form {
            display: none;
        }

        .signup-form.active {
            display: block;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #2c3e50;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fff;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .form-control.error {
            border-color: #e74c3c;
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.1);
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.875rem;
            margin-top: 0.25rem;
            display: none;
        }

        .password-strength {
            margin-top: 0.5rem;
        }

        .strength-bar {
            height: 4px;
            background: #ecf0f1;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .strength-text {
            font-size: 0.875rem;
            color: #7f8c8d;
        }

        .oauth-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .oauth-button {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            text-decoration: none;
            color: #2c3e50;
            font-weight: 500;
            transition: all 0.3s ease;
            gap: 0.5rem;
        }

        .oauth-button:hover {
            border-color: #bdc3c7;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .oauth-button.google {
            border-color: #db4437;
            color: #db4437;
        }

        .oauth-button.microsoft {
            border-color: #0078d4;
            color: #0078d4;
        }

        .divider {
            text-align: center;
            margin: 2rem 0;
            position: relative;
            color: #bdc3c7;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #ecf0f1;
            z-index: 1;
        }

        .divider span {
            background: white;
            padding: 0 1rem;
            position: relative;
            z-index: 2;
        }

        /* Buttons */
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            width: 100%;
            box-shadow: 0 4px 15px rgba(238, 90, 36, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(238, 90, 36, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            color: #7f8c8d;
            border: 2px solid #bdc3c7;
            margin-right: 1rem;
        }

        .btn-secondary:hover {
            border-color: #2c3e50;
            color: #2c3e50;
            background: transparent;
        }

        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .checkbox-group input[type="checkbox"] {
            margin-right: 0.5rem;
            transform: scale(1.2);
        }

        .checkbox-group label {
            margin-bottom: 0;
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        .checkbox-group a {
            color: #667eea;
            text-decoration: none;
        }

        .checkbox-group a:hover {
            text-decoration: underline;
        }

        /* Success Message */
        .success-message {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .success-message.show {
            display: block;
            animation: fadeIn 0.5s ease-in;
        }

        .success-icon {
            font-size: 4rem;
            color: #2ecc71;
            margin-bottom: 1rem;
            animation: bounce 1s ease-in-out;
        }

        @keyframes bounce {

            0%,
            20%,
            60%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-20px);
            }

            80% {
                transform: translateY(-10px);
            }
        }

        /* Loading Animation */
        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .loading.show {
            display: flex;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #ecf0f1;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        /* Responsive */
        @media (max-width: 1024px) {
            .signup-container {
                grid-template-columns: 1fr;
                gap: 3rem;
                max-width: 600px;
                margin: 0 auto;
            }

            .signup-info {
                text-align: center;
                order: 2;
            }

            .signup-info h1 {
                font-size: 2.5rem;
            }

            .benefits {
                display: inline-block;
                text-align: left;
            }

            .signup-form-container {
                order: 1;
            }
        }

        @media (max-width: 640px) {
            .signup-form-container {
                padding: 2rem 1.5rem;
            }

            .signup-info h1 {
                font-size: 2rem;
            }

            .oauth-buttons {
                grid-template-columns: 1fr;
            }

            .form-actions {
                flex-direction: column;
                gap: 1rem;
            }

            .btn-secondary {
                margin-right: 0;
                width: 100%;
                margin-bottom: 0.5rem;
            }

            .btn-primary {
                width: 100%;
            }

            .logo-img-wrapper img {
                height: 50px;
            }

            .logo {
                font-size: 1.2rem;
            }

            /* Compact steps for mobile */
            .signup-steps {
                margin-bottom: 1.5rem;
            }

            .step-number {
                width: 24px;
                height: 24px;
                font-size: 0.75rem;
                margin-right: 0.25rem;
            }

            .step {
                font-size: 0.8rem;
            }

            .step:not(:last-child)::after {
                width: 20px;
                margin: 0 0.5rem;
            }
        }

        /* Email validation styles */
        .validation-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }

        .form-group {
            position: relative;
        }

        .validation-icon.valid {
            color: #2ecc71;
        }

        .validation-icon.invalid {
            color: #e74c3c;
        }
    </style>
</head>

<body>
    <div class="header-bg"></div>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="#" class="logo">
                    <div class="logo-img-wrapper">
                        <img src="logo-Agent.png" alt="AI Agent Logo">
                    </div>
                    AI EMAILOVÝ AGENT
                </a>
                <a href="index.html" class="back-link">← Zpět</a>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="signup-container" style="display: flex; justify-content: center;">
                <div class="signup-form-container" style="width: 100%; max-width: 500px;">
                    <div class="form-header">
                        <h2 id="formTitle">Zapomenuté heslo</h2>
                        <p id="formSubtitle">Zadejte svůj email a pošleme vám odkaz pro obnovení hesla.</p>
                    </div>

                    <form class="signup-form active" id="forgotPasswordForm" style="display: block;">
                        <div class="form-group">
                            <label for="recoveryEmail">Email</label>
                            <input type="email" id="recoveryEmail" class="form-control" placeholder="jan@priklad.cz"
                                required>
                            <div class="error-message" id="emailError">Zadejte platnou emailovou adresu</div>
                        </div>

                        <div class="form-actions" style="flex-direction: column; gap: 1rem;">
                            <button type="submit" class="btn btn-primary" id="recoveryBtn" style="width: 100%;">
                                <span class="button-text">Odeslat odkaz</span>
                                <div class="loading">
                                    <div class="spinner"></div><span>Odesílám…</span>
                                </div>
                            </button>
                            <a href="login.html" class="btn btn-secondary"
                                style="width: 100%; text-align: center; margin-right: 0;">Zpět na přihlášení</a>
                        </div>
                    </form>

                    <div class="success-message" id="successMessage" style="display: none;">
                        <div class="success-icon">✓</div>
                        <h3 style="color: #2c3e50; margin-bottom: 1rem;">Odkaz odeslán!</h3>
                        <p style="color: #7f8c8d; margin-bottom: 2rem;">
                            Pokud účet s tímto emailem existuje, odeslali jsme na něj odkaz pro obnovení hesla.
                        </p>
                        <a href="login.html" class="btn btn-primary" style="display: block; text-align: center;">Zpět na
                            přihlášení</a>
                    </div>
                </div>
            </div>
        </div>
    </main>



    <div class="overlay" id="overlay">
        <div class="loader">
            <div class="ring" aria-hidden="true"></div>
            <p>Probíhá odesílání…</p>
        </div>
    </div>

    <script>
        window.BACKEND = 'https://ai-email-server-stejdesign.onrender.com';
        // NEBO pro lokální vývoj:
        // window.BACKEND = 'http://localhost:5000';

        function startLoading(btn) {
            btn.disabled = true;
            btn.querySelector('.button-text')?.style && (btn.querySelector('.button-text').style.display = 'none');
            btn.querySelector('.loading')?.classList.add('show');
            document.getElementById('overlay')?.classList.add('show');
        }
        function stopLoading(btn) {
            btn.disabled = false;
            btn.querySelector('.button-text')?.style && (btn.querySelector('.button-text').style.display = 'inline');
            btn.querySelector('.loading')?.classList.remove('show');
            document.getElementById('overlay')?.classList.remove('show');
        }

        const forgotPasswordForm = document.getElementById('forgotPasswordForm');
        const recoveryBtn = document.getElementById('recoveryBtn');

        forgotPasswordForm?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('recoveryEmail').value.trim();
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('emailError').style.display = 'block';
                return;
            } else {
                document.getElementById('emailError').style.display = 'none';
            }

            startLoading(recoveryBtn);
            try {
                const r = await fetch(`${window.BACKEND}/api/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await r.json();

                forgotPasswordForm.style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
            } catch (err) {
                console.error(err);
                alert(err.message || 'Chyba serveru.');
            } finally {
                stopLoading(recoveryBtn);
            }
        });
    </script>
</body>

</html>
