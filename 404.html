<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <meta name="description" content="Stránka nenalezena - AI Emailový Agent">
    <meta name="robots" content="noindex, follow">
    <title>404 Stránka nenalezena - AI Emailový Agent</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #ecf0f1;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Grid */
        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            opacity: 0.3;
            background-image:
                linear-gradient(rgba(102, 126, 234, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(102, 126, 234, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 15s linear infinite;
        }

        @keyframes gridMove {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(40px);
            }
        }

        .container {
            z-index: 1;
            padding: 40px 20px;
            max-width: 600px;
        }

        h1 {
            font-size: 8rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 10px 30px rgba(238, 90, 36, 0.3);
            line-height: 1;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #fff;
        }

        p {
            font-size: 1.1rem;
            color: #bdc3c7;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 14px 32px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.6);
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="container">
        <h1>404</h1>
        <h2>Jejda! Tady nic není.</h2>
        <p>Zdá se, že stránka, kterou hledáte, neexistuje nebo byla přesunuta.</p>
        <a href="/" class="btn">Zpět na hlavní stránku</a>
    </div>
</body>

</html>
